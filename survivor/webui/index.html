<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Circa Survivor 2026</title>
<style>
/* ============================================================
   v2.1 — smooth skin. Inter everywhere, soft slate palette,
   rounded surfaces, no scanlines, no mono numerals.
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#0f1117; --panel:#161923; --panel2:#1b1f2b; --cell:#1a1e29;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
  --amber:#e0b15c; --amber-deep:#c99a3f;
  --green:#4ade80; --red:#f87171; --teal:#5eead4; --violet:#a78bfa;
  --text:#eef0f4; --dim:#9aa3b2;
  --r:14px; --r-sm:10px;
  --shadow:0 6px 24px rgba(0,0,0,.35);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,sans-serif; font-size:14px;
  -webkit-font-smoothing:antialiased; padding-bottom:70px; }
main, header, nav { position:relative; z-index:1; }

/* ---- masthead ---- */
header { padding:20px 20px 14px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.brand { font-weight:800; font-size:1.15rem; letter-spacing:-.01em; color:var(--text); }
.brand small { display:block; font-size:.68rem; font-weight:500; color:var(--dim); letter-spacing:.02em; }
.weekbox { font-weight:800; font-size:1.35rem; color:var(--bg);
  background:linear-gradient(135deg,var(--amber),var(--amber-deep));
  padding:6px 18px; border-radius:999px; box-shadow:var(--shadow); }
.leds { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
.led { display:flex; align-items:center; gap:7px; font-size:.72rem; font-weight:600;
  color:var(--dim); background:var(--panel); border:1px solid var(--line);
  padding:6px 12px; border-radius:999px; }
.led i { width:7px; height:7px; border-radius:50%; background:var(--green); }
.led.warn i { background:var(--amber); }
.led.bad i { background:var(--red); }

/* ---- nav ---- */
nav { display:flex; gap:6px; overflow-x:auto; padding:6px 16px 14px;
  position:sticky; top:0; background:var(--bg); z-index:6; }
nav button { flex:0 0 auto; background:var(--panel); border:1px solid var(--line);
  color:var(--dim); font:inherit; font-weight:600; font-size:.88rem;
  padding:9px 18px; border-radius:999px; cursor:pointer; transition:all .15s; }
nav button:hover { color:var(--text); border-color:var(--line2); }
nav button.on { color:#141310; background:linear-gradient(135deg,var(--amber),var(--amber-deep));
  border-color:transparent; font-weight:700; }

main { padding:8px 16px; max-width:1240px; margin:0 auto; }
.view { display:none; } .view.on { display:block; }

h2 { font-weight:700; font-size:.95rem; letter-spacing:.01em; color:var(--text);
  margin:22px 0 10px; display:flex; align-items:center; gap:12px; }
h2::after { content:""; flex:1; height:1px; background:var(--line); }
.dim { color:var(--dim); font-size:.76rem; }

/* ---- strategy guide ---- */
.guide { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; margin:12px 0 4px; }
.gcard { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:16px; }
.gcard h4 { font-weight:700; font-size:.95rem; display:flex; align-items:center; gap:8px; }
.gcard h4::before { content:""; width:9px; height:9px; border-radius:50%; background:currentColor; }
.gcard p { font-size:.78rem; color:var(--dim); margin-top:8px; line-height:1.55; }
.gcard .how { margin-top:10px; font-size:.7rem; color:var(--text); background:var(--cell);
  border-radius:var(--r-sm); padding:8px 10px; line-height:1.5; }
details.guidewrap > summary { cursor:pointer; font-weight:700; color:var(--amber);
  font-size:.88rem; padding:10px 0 2px; list-style:none; }
details.guidewrap > summary::before { content:"▸ "; }
details.guidewrap[open] > summary::before { content:"▾ "; }

/* ---- entry ticket ---- */
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:16px; }
.ticket { background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
  border-left:4px solid var(--amber); box-shadow:var(--shadow); overflow:hidden; }
.t-head { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; }
.t-head .nm { font-weight:800; font-size:1.02rem; letter-spacing:.01em; }
.t-head .st { width:9px; height:9px; border-radius:50%; }
.t-head select { margin-left:auto; }
.t-body { padding:4px 16px 16px; }

/* matchup */
.mu { background:var(--cell); border:1px solid var(--line); border-radius:var(--r);
  padding:16px; margin-bottom:14px; }
.mu-status { display:flex; justify-content:space-between; font-size:.72rem;
  font-weight:600; margin-bottom:10px; }
.mu-status .act { color:var(--amber); } .mu-status .lk { color:var(--green); }
.mu-team { font-weight:800; font-size:1.7rem; line-height:1.15; letter-spacing:-.02em; }
.mu-team .opp { color:var(--dim); font-size:1.15rem; font-weight:600; }
.mu-team .tag { font-size:.64rem; font-weight:700; letter-spacing:.08em; color:var(--dim); }
.mu-line { font-size:.78rem; color:var(--dim); margin:8px 0 12px; }
.probrow { display:flex; align-items:center; gap:12px; }
.pbar { flex:1; height:9px; background:rgba(255,255,255,.06); border-radius:999px; overflow:hidden; }
.pfill { height:100%; border-radius:999px;
  background:linear-gradient(90deg,var(--amber-deep),var(--amber)); }
.pnum { font-weight:800; font-size:1.1rem; color:var(--amber); }
.warnline { margin-top:10px; color:var(--amber); font-size:.74rem; font-weight:500; }
.actrow { display:flex; gap:12px; margin-top:14px; align-items:center; }
button.go { font:inherit; font-weight:700; font-size:.9rem;
  background:linear-gradient(135deg,var(--amber),var(--amber-deep)); color:#141310;
  border:none; padding:11px 22px; border-radius:999px; cursor:pointer;
  transition:opacity .15s, transform .1s; }
button.go:hover:not(:disabled) { transform:translateY(-1px); }
button.go:disabled { opacity:.35; cursor:default; }
button.sub { font:inherit; font-size:.8rem; font-weight:600; background:none;
  color:var(--dim); border:1px solid var(--line2); padding:10px 16px;
  border-radius:999px; cursor:pointer; }
button.sub:hover { color:var(--text); }
label.ck { font-size:.74rem; color:var(--dim); display:flex; gap:7px; align-items:center; }
input[type=checkbox] { accent-color:var(--amber); width:15px; height:15px; }

/* season rail — smooth floating tiles */
.rail { display:flex; gap:8px; overflow-x:auto; padding:4px 2px 12px; margin-bottom:6px; }
.rail.wrap { flex-wrap:wrap; overflow:visible; }
.cellw { flex:0 0 auto; min-width:74px; border-radius:var(--r-sm); background:var(--cell);
  border:1px solid var(--line); text-align:center; padding:9px 8px 8px; cursor:pointer;
  transition:transform .12s, border-color .15s; }
.cellw:hover { transform:translateY(-2px); border-color:var(--line2); }
.cw-wk { font-size:.6rem; font-weight:600; color:var(--dim); letter-spacing:.04em; }
.cw-tm { font-weight:800; font-size:1rem; margin-top:1px; }
.cw-p { font-size:.64rem; color:var(--dim); }
.cw-b { font-size:.56rem; font-weight:700; letter-spacing:.03em; margin-top:2px; }
.cellw.now { border-color:var(--amber); background:rgba(224,177,92,.1);
  box-shadow:0 0 0 1px var(--amber); }
.cellw.locked { border-color:var(--green); background:rgba(74,222,128,.07); }
.cellw.hol { border-color:var(--violet); background:rgba(167,139,250,.08); }
.cellw.gap { opacity:.45; }

/* weekly strategy editor — soft pills */
.stratstrip { display:flex; gap:8px; overflow-x:auto; padding:4px 2px 12px; margin-bottom:6px; }
.stratstrip.wrap { flex-wrap:wrap; overflow:visible; }
.stratstrip.wrap .scell { min-width:96px; }
.scell { flex:0 0 auto; background:var(--cell); border:1px solid var(--line);
  border-radius:var(--r-sm); padding:8px 10px; text-align:center; }
.scell .wk { font-size:.6rem; font-weight:600; color:var(--dim); margin-bottom:5px; }
.scell select { font-size:.68rem; padding:4px 6px; border-radius:8px; }
select { background:var(--panel2); color:var(--text); border:1px solid var(--line2);
  font:inherit; font-size:.8rem; padding:8px 12px; border-radius:var(--r-sm); }
option { background:var(--panel2); }

/* holiday panels */
.holgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.holpanel { background:var(--cell); border:1px solid var(--line); border-radius:var(--r); padding:14px; }
.holpanel h5 { font-weight:700; font-size:.85rem; display:flex; justify-content:space-between;
  align-items:center; }
.holpanel h5 .n { color:var(--violet); font-size:.7rem; font-weight:600; }
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.tchip { font-size:.7rem; font-weight:600; padding:5px 10px; border-radius:999px;
  border:1px solid var(--line2); cursor:pointer; transition:border-color .15s; }
.tchip:hover { border-color:var(--text); }
.tchip.avail { color:var(--text); }
.tchip.burned { color:var(--dim); text-decoration:line-through; opacity:.5; cursor:default; }
.tchip.planned { border-color:var(--violet); color:var(--violet); }
.tchip.lockedt { background:var(--green); color:#12251a; border-color:var(--green); cursor:default; }
@media (max-width:520px) { .holgrid { grid-template-columns:1fr; } }

/* tables — soft rows */
table { width:100%; border-collapse:separate; border-spacing:0; margin:12px 0;
  background:var(--panel); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }
th { font-weight:600; font-size:.7rem; letter-spacing:.04em; color:var(--dim);
  text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); background:var(--panel2); }
td { padding:10px 12px; border-bottom:1px solid var(--line); font-size:.8rem; }
tr:last-child td { border-bottom:none; }
td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
tr.rec td { color:var(--amber); font-weight:600; }
tr.clickable { cursor:pointer; } tr.clickable:hover td { background:rgba(255,255,255,.03); }

/* metrics / banners / misc */
.metricrow { display:flex; gap:12px; margin:14px 0; flex-wrap:wrap; }
.metric { background:var(--cell); border:1px solid var(--line); border-radius:var(--r);
  padding:12px 18px; min-width:150px; }
.metric .lbl { font-size:.64rem; font-weight:600; color:var(--dim); letter-spacing:.04em; }
.metric .val { font-weight:800; font-size:1.5rem; margin-top:2px; }
.up { color:var(--green); font-size:.76rem; font-weight:600; }
.dn { color:var(--red); font-size:.76rem; font-weight:600; }
.banner { border:1px solid; border-radius:var(--r-sm); padding:11px 14px;
  font-size:.78rem; margin:10px 0; line-height:1.5; }
.banner.err { border-color:rgba(248,113,113,.4); color:#fca5a5; background:rgba(248,113,113,.06); }
.banner.info { border-color:rgba(167,139,250,.4); color:#c4b5fd; background:rgba(167,139,250,.06); }
.banner.ok { border-color:rgba(74,222,128,.4); color:#86efac; background:rgba(74,222,128,.06); }
.dchip { display:inline-block; font-size:.72rem; font-weight:600; padding:5px 12px;
  margin:0 6px 6px 0; border:1px solid; border-radius:999px; }
.dchip.ok { color:var(--green); border-color:rgba(74,222,128,.4); }
.dchip.bad { color:var(--red); border-color:rgba(248,113,113,.5); background:rgba(248,113,113,.07); }
.dials { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin:12px 0; }
.dial { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:14px; }
.dial label { font-size:.7rem; font-weight:600; color:var(--dim); display:block; margin-bottom:10px; }
.dial input[type=range] { width:100%; accent-color:var(--amber); }
.dial .dv { color:var(--amber); font-weight:700; }
input[type=number], input[type=text] { background:var(--panel2); color:var(--text);
  border:1px solid var(--line2); font:inherit; font-size:.8rem; padding:9px 12px;
  border-radius:var(--r-sm); }
.toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  background:var(--panel2); border:1px solid var(--amber); color:var(--text);
  padding:11px 24px; border-radius:999px; font-size:.8rem; font-weight:600;
  opacity:0; transition:opacity .25s; pointer-events:none; z-index:99; box-shadow:var(--shadow); }
.toast.show { opacity:1; }
@media (max-width:640px) { .weekbox { font-size:1.1rem; } .mu-team { font-size:1.35rem; } }

/* projection picker */
.seg { display:inline-flex; background:var(--panel); border:1px solid var(--line);
  border-radius:999px; padding:3px; gap:2px; }
.seg button { font:inherit; font-size:.76rem; font-weight:600; color:var(--dim);
  background:none; border:none; border-radius:999px; padding:7px 14px; cursor:pointer; }
.seg button.on { color:#141310; background:linear-gradient(135deg,var(--amber),var(--amber-deep)); }
/* teams matrix */
.tmx { overflow:auto; border:1px solid var(--line); border-radius:var(--r);
  max-height:70vh; }
.tmx table { margin:0; border:none; border-radius:0; }
.tmx thead th { position:sticky; top:0; z-index:3; }
.tmx thead th:first-child { left:0; z-index:4; }
.tmx tbody td:first-child, .tmx tbody th:first-child { position:sticky; left:0;
  background:var(--panel2); z-index:2; font-weight:700; }
.tmx td { white-space:nowrap; font-size:.72rem; padding:7px 9px; }
.cell-g { background:rgba(74,222,128,.14); }
.cell-a { background:rgba(224,177,92,.12); }
.cell-r { background:rgba(248,113,113,.10); }
.rowused td { opacity:.35; text-decoration:line-through; }
.best { color:var(--amber); font-weight:800; }
</style>
</head>
<body>
<header>
  <div class="brand">Circa Survivor<small>2026 · Contest board</small></div>
  <div class="weekbox" id="hd-week">…</div>
  <div class="leds">
    <span class="led" id="led-alive"><i></i><span>–</span></span>
    <span class="led" id="led-lock"><i></i><span>–</span></span>
    <span class="led" id="led-solver"><i></i><span>–</span></span>
  </div>
</header>
<nav id="nav"></nav>
<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
const $ = (s, el=document) => el.querySelector(s);
const EL = e => Number(e) + 1;  // display label: state id "0"/"1" shown as Entry 1/2
const BUCKETS = ["chalk","contrarian","conservation"];
const BC = {chalk:"var(--green)", contrarian:"var(--red)", conservation:"var(--teal)", neutral:"var(--dim)"};
const BSHORT = {chalk:"Chalk", contrarian:"Contra", conservation:"Conserve", neutral:"Neutral"};
const GUIDE = [
  ["Chalk","var(--green)",
   "Take the safest favorite, full stop. This entry's job is pure survival — it rides the highest win probability available every week.",
   "How it's built: zero popularity penalty · light team-conservation (0.4×). Objective ≈ maximize log(win prob)."],
  ["Contrarian","var(--red)",
   "Fade the crowd. Avoids the most-picked favorite so that when a chalk team loses, this entry gains ground on the whole field instead of dying with it.",
   "How it's built: heavy popularity penalty (1.5×) against each week's top-prob team · normal conservation (1.0×)."],
  ["Conserve","var(--teal)",
   "Save the studs. Burns low-value teams (bad season win totals) in their rare good spots and protects elite + holiday-pool teams for when they're needed.",
   "How it's built: 2.2× future-value penalty — FV = (win total − 8.5)/3 + 0.3 per holiday pool · mild popularity fade (0.3×)."],
];

let D = null;
let dials = JSON.parse(localStorage.getItem("dials") || "null") ||
            {horizon:17, min_prob:0.55, holiday_min_prob:0.50, future_value_weight:0.5, endgame:false};
let route = location.hash.slice(1) || "board";
let planSel = {};

function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200); }
function qs(extra={}){ const p=new URLSearchParams();
  for (const [k,v] of Object.entries(dials)) p.set(k,v);
  for (const [k,v] of Object.entries(extra)) p.set(k,v); return p.toString(); }
async function api(path, body){
  const opt = body ? {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)} : {};
  const r = await fetch(path, opt);
  if (!r.ok){ const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||r.statusText); }
  return r.json();
}
async function refresh(){ D = await api(`/api/board?${qs()}`); renderHeader(); renderNav(); renderView(); }

/* ---------- header/nav ---------- */
function renderHeader(){
  $("#hd-week").textContent = D.current_leg;
  const ids = Object.keys(D.entries).sort();
  const alive = ids.filter(e=>D.entries[e].alive).length;
  const locked = ids.filter(e=>D.entries[e].picks[D.current_leg]).length;
  const set = (id, txt, cls) => { const el=$(id); el.querySelector("span").textContent=txt;
    el.className = "led" + (cls?` ${cls}`:""); };
  set("#led-alive", `${alive}/${ids.length} alive`, alive<ids.length?"bad":"");
  set("#led-lock", `${locked}/${alive} locked`, locked<alive?"warn":"");
  set("#led-solver", `solver ${D.meta.status}`, D.meta.status==="Optimal"?"":"bad");
}
function renderNav(){
  const ids = Object.keys(D.entries).sort();
  const tabs = [["board","Board"], ...ids.map(e=>[`entry-${e}`,`Entry ${EL(e)}`]),
                ["teams","Teams"], ["market","Market"], ["audit","Audit"], ["tools","Tools"]];
  $("#nav").innerHTML = tabs.map(([r,l]) =>
    `<button class="${route===r?'on':''}" onclick="go('${r}')">${l}</button>`).join("");
}
function go(r){ route=r; location.hash=r; renderNav(); renderView(); window.scrollTo(0,0); }

/* ---------- shared ---------- */
const rec = t => D.records[t] ? ` <span class="dim">(${D.records[t]})</span>` : "";
const pct = p => p==null ? "—" : (p*100).toFixed(1)+"%";
function gameFor(gm, team){ for (const [k,m] of Object.entries(gm||{})) {
  const [a,h]=k.split("|"); if (team===a||team===h) return {away:a,home:h,m}; } return null; }
const effB = (ent,leg) => (ent.leg_buckets||{})[leg] || ent.bucket;


const HOPTS = [[1,"This week"],[3,"3 weeks"],[6,"6 weeks"],[17,"Full season"]];
function projPicker(){
  return `<div style="display:flex;align-items:center;gap:12px;margin:12px 0 4px;flex-wrap:wrap">
    <span class="dim" style="font-weight:600">Projection</span>
    <div class="seg">${HOPTS.map(([v,l]) =>
      `<button class="${dials.horizon==v?'on':''}" onclick="dials.horizon=${v};saveDials()">${l}</button>`).join("")}</div>
    <span class="dim">how far the model maps out — holiday reservations always shown</span></div>`;
}

function guidePanel(open=false){
  return `<details class="guidewrap"${open?" open":""}><summary>Strategy guide — what each mode does</summary>
    <div class="guide">${GUIDE.map(([n,c,what,how]) =>
      `<div class="gcard" style="border-top-color:${c}"><h4 style="color:${c}">${n}</h4>
       <p>${what}</p><div class="how">${how}</div></div>`).join("")}</div>
    <p class="dim" style="margin:8px 0 2px">Set a default per entry (ticket header) and override any single
    week in the Strategy by week strip — leave a week blank to inherit the entry default; a blank default means no strategy at all (the model simply takes the best win probability) — the season plan re-solves instantly around your choices.
    Holiday weeks are exempt: conserved teams get spent there by design.</p></details>`;
}

function bucketSelect(e, leg=null){
  const ent = D.entries[e];
  const cur = leg ? (ent.leg_buckets||{})[leg]||"" : ent.bucket||"";
  const opts = (leg ? [["","—"]] : [["","—"]])
    .concat(BUCKETS.map(b=>[b,BSHORT[b]]));
  return `<select onchange="setBucket('${e}', this.value, ${leg?`'${leg}'`:"null"})"
    style="${leg?'':'font-weight:700;'}color:${BC[cur]||'var(--dim)'}">
    ${opts.map(([v,l])=>`<option value="${v}" ${v===cur?"selected":""}>${l}</option>`).join("")}</select>`;
}

function matchup(e){
  const ent = D.entries[e], leg = D.current_leg;
  const locked = ent.picks[leg];
  const pick = locked || (D.plan[e]||{})[leg];
  if (!ent.alive) return `<div class="mu"><div class="dim">Eliminated</div></div>`;
  if (!pick) return `<div class="mu"><div class="dim">no pick clears the floor — lower the weekly floor in Tools</div></div>`;
  const p = (D.probs[leg]||{})[pick];
  const g = gameFor(D.game_meta, pick);
  let opp="", line="line not posted yet", warn="";
  if (g){
    const isA = pick===g.away, o = isA?g.home:g.away;
    opp = `<span class="opp">${isA?"@":"vs"} ${o}</span>${rec(o)} <span class="tag">${isA?"AWAY":"HOME"}</span>`;
    const bits=[];
    if (g.m.kickoff_display) bits.push(g.m.kickoff_display);
    const sh=g.m.spread_home;
    if (sh!=null){ const sp = pick===g.home?sh:-sh;
      bits.push(Math.abs(sp)<0.05?"PK":`${pick} ${sp>0?"+":""}${sp.toFixed(1)}`);
      if (sp>0.5) warn=`<div class="warnline">⚠ UNDERDOG +${sp.toFixed(1)} — verify before locking</div>`; }
    const ml = pick===g.home?g.m.ml_home:g.m.ml_away;
    if (ml!=null) bits.push(`ML ${ml>0?"+":""}${ml}`);
    line = bits.join("  ·  ");
  }
  const ou = D.win_totals[pick]?`${D.win_totals[pick].toFixed(1)} O/U`:"";
  const act = locked
    ? `<div class="actrow"><button class="sub" onclick="doUnlock('${e}','${leg}')">Unlock</button></div>`
    : `<div class="actrow"><label class="ck"><input type="checkbox"
         onchange="$('#lk-${e}').disabled=!this.checked"> Confirm</label>
       <button class="go" id="lk-${e}" disabled onclick="doLock('${e}','${leg}','${pick}')">Lock ${pick}</button></div>`;
  return `<div class="mu">
    <div class="mu-status"><span class="${locked?'lk':'act'}">${locked?'● Locked':'▶ Pick now'}</span>
      <span class="dim">${ou}</span></div>
    <div class="mu-team">${pick}${rec(pick)} ${opp}</div>
    <div class="mu-line">${line}</div>
    <div class="probrow"><div class="pbar"><div class="pfill" style="width:${(p||0)*100}%"></div></div>
      <span class="pnum">${pct(p)}</span></div>
    ${warn}${act}</div>`;
}

function rail(e, wrap){
  const ent = D.entries[e];
  return `<div class="rail${wrap?' wrap':''}">` + D.loaded_legs.map(({id:lid, holiday}) => {
    const lockedT = ent.picks[lid];
    const planned = (D.plan[e]||{})[lid];
    const icon = lid==="TXWEEK"?"🎄":lid==="XMASWEEK"?"🎁":"";
    const b = effB(ent, lid);
    let cls, tm, sub;
    if (lockedT){ cls="locked"; tm=`✓${lockedT}`; sub="locked"; }
    else if (lid===D.current_leg && planned){ cls="now"; tm=planned; sub=pct((D.probs[lid]||{})[planned]); }
    else if (holiday && planned){ cls="hol"; tm=planned; sub=pct((D.probs[lid]||{})[planned]); }
    else if (planned){ cls=""; tm=planned; sub=pct((D.probs[lid]||{})[planned]); }
    else { cls="gap"; tm="—"; sub=""; }
    const chip = (!holiday&&b)?`<div class="cw-b" style="color:${BC[b]}">${BSHORT[b]}</div>`:"";
    return `<div class="cellw ${cls}" onclick="openPlanner('${e}','${lid}')" title="plan ${lid}">
      <div class="cw-wk">${icon}${lid}</div><div class="cw-tm">${tm}</div>
      <div class="cw-p">${sub}</div>${chip}</div>`;
  }).join("") + `</div>`;
}

function stratStrip(e, wrap){
  const cells = D.loaded_legs.filter(l=>!l.holiday).map(({id:lid}) =>
    `<div class="scell"><div class="wk">${lid}${lid===D.current_leg?" ●":""}</div>${bucketSelect(e, lid)}</div>`);
  return `<div class="stratstrip${wrap?' wrap':''}">${cells.join("")}</div>`;
}

function holidayPanels(e){
  const ent = D.entries[e];
  return `<div class="holgrid">` + [["TXWEEK","🎄 Thanksgiving"],["XMASWEEK","🎁 Christmas"]].map(([hw,label]) => {
    const pool = D.pools[hw];
    const lockedT = ent.picks[hw];
    const planned = (D.plan[e]||{})[hw];
    const avail = pool.filter(t=>!ent.used.includes(t));
    const chips = pool.map(t => {
      const p = (D.probs[hw]||{})[t];
      const ptxt = p!=null?` ${Math.round(p*100)}%`:"";
      if (lockedT===t) return `<span class="tchip lockedt">${t} ✓</span>`;
      if (!avail.includes(t)) return `<span class="tchip burned">${t}</span>`;
      if (planned===t) return `<span class="tchip planned" onclick="openPlanner('${e}','${hw}')">${t}${ptxt} ◈</span>`;
      return `<span class="tchip avail" onclick="openPlanner('${e}','${hw}')">${t}${ptxt}</span>`;
    }).join("");
    const n = lockedT ? `locked ${lockedT}` : `${avail.length}/${pool.length} available`;
    return `<div class="holpanel"><h5>${label} <span class="n">${n}</span></h5>
      <div class="chips">${chips}</div></div>`;
  }).join("") + `</div>
  <p class="dim" style="margin-top:6px">◈ = model reservation · struck = burned in an earlier week · tap a team to plan that holiday</p>`;
}

function weekLabel(e, lid){
  const ent = D.entries[e];
  const icon = lid==="TXWEEK"?"🎄 ":lid==="XMASWEEK"?"🎁 ":"";
  if (ent.picks[lid]) return `${icon}${lid} — 🔒 ${ent.picks[lid]}`;
  const t = (D.plan[e]||{})[lid];
  const b = effB(ent,lid)||"—";
  if (t){ const p=(D.probs[lid]||{})[t];
    return `${icon}${lid} — ${t} (${p?Math.round(p*100)+"%":"?"}) · ${b}${lid===D.current_leg?" ← now":""}`; }
  return `${icon}${lid} — none above floor · ${b}`;
}
function decChips(){
  const ids = Object.keys(D.entries).sort();
  const scope = new Set([...(D.meta.near_term||[]), ...(D.meta.holiday||[])]);
  return D.loaded_legs.filter(({id})=>scope.has(id)).slice(0,12).map(({id:lid}) => {
    const teams = ids.map(e=>D.entries[e].picks[lid]||(D.plan[e]||{})[lid]).filter(Boolean);
    if (teams.length<2) return "";
    const ok = new Set(teams).size===teams.length;
    return `<span class="dchip ${ok?'ok':'bad'}">${lid} ${teams.join("/")}</span>`;
  }).join("");
}
function dial(key,label,min,max,step){
  return `<div class="dial"><label>${label} — <span class="dv" id="dv-${key}">${dials[key]}</span></label>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${dials[key]}"
      oninput="$('#dv-${key}').textContent=this.value"
      onchange="dials['${key}']=parseFloat(this.value);saveDials()"></div>`;
}
function saveDials(){ localStorage.setItem("dials", JSON.stringify(dials)); toast("re-solving…"); refresh(); }

/* ---------- planner ---------- */
function openPlanner(e, leg){
  planSel[e]=leg;
  if (route!==`entry-${e}`) go(`entry-${e}`);
  else { const s=$("#plan-leg"); if (s) s.value=leg; loadPlanner(e, leg); }
}
let lastPlan = {};

function matchupCell(team, gm){
  const g = gameFor(gm, team);
  if (!g) return `<span class="dim">—</span>`;
  const isA = team===g.away, opp = isA?g.home:g.away;
  let sp = "";
  if (g.m.spread_home!=null){
    const s = isA ? -g.m.spread_home : g.m.spread_home;
    sp = Math.abs(s)<0.05 ? `<span class="dim"> PK</span>`
         : `<span class="dim"> ${s>0?"+":""}${s.toFixed(1)}</span>`;
  }
  return `${isA?"@":"vs"} ${opp}${sp}`;
}

async function loadPlanner(e, leg){
  const el = $("#planner"); el.innerHTML = `<p class="dim">loading ${leg}…</p>`;
  try {
    const P = await api(`/api/plan?entry=${e}&leg=${leg}&${qs()}`);
    lastPlan[`${e}|${leg}`] = P;
    if (P.locked){
      el.innerHTML = `<div class="banner info">${leg} is locked on <b>${P.locked_team}</b>.</div>
        <label class="ck"><input type="checkbox" id="unlock-ok"> confirm unlock</label>
        <div class="actrow"><button class="sub" onclick="if($('#unlock-ok').checked) doUnlock('${e}','${leg}')">Unlock ${leg}</button></div>`;
      return;
    }
    if (!P.alternatives.length){
      el.innerHTML = `<div class="banner info">No teams available for ${leg}.</div>`;
      return;
    }
    const above = P.alternatives.filter(a=>!a.below_floor);
    const below = P.alternatives.filter(a=>a.below_floor);
    const showAll = localStorage.getItem(`showall_${e}`) === "1";
    const visible = showAll ? P.alternatives : above;
    el.innerHTML = `<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <span class="dim">${above.length} team${above.length!==1?"s":""} above your ${Math.round(P.floor*100)}% floor · ${below.length} below</span>
      <label class="ck" style="color:var(--amber);font-weight:600"><input type="checkbox" ${showAll?"checked":""}
        onchange="localStorage.setItem('showall_${e}', this.checked?'1':'0');loadPlanner('${e}','${leg}')">
        show all ${P.alternatives.length} teams — every team playing this week is selectable, floor or not</label></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Team</th><th>Game</th><th class="num">Win%</th><th class="num">O/U</th>
      <th>Style</th><th>Pool</th><th>Stack</th><th>FV</th><th></th></tr></thead><tbody>` +
      visible.map(a => `<tr class="${a.is_rec?'rec':''} clickable" style="${a.below_floor?'opacity:.5':''}" onclick="runWhatIf('${e}','${leg}','${a.team}')">
        <td>${a.is_rec?"★ ":""}${a.team}${rec(a.team)}</td>
        <td style="white-space:nowrap">${matchupCell(a.team, P.game_meta)}</td>
        <td class="num">${pct(a.win_prob)}</td>
        <td class="num">${a.ou!=null?a.ou.toFixed(1):"—"}</td>
        <td>${a.below_floor?`<span class="dim">below floor</span>`:styleBadges(a.style, a.style_strong)}</td>
        <td>${[a.in_tx?"TX":null,a.in_xmas?"XMAS":null].filter(Boolean).join("/")||"—"}</td>
        <td>${a.stacks_with.join(",")||"—"}</td>
        <td>${a.fv>=0.8?"🛑 hold":a.fv>=0.35?"🤔 costly":"✅ burn"}</td>
        <td class="dim">explore →</td></tr>`).join("") + `</tbody></table></div>
      <p class="dim">★ model pick · Style = which strategy would take this pick this week ·
      FV = season value of NOT burning the team now · click a row to see the ripple</p>
      ${routingNote(P, leg)}
      <div id="whatif"></div>`;
  } catch(err){ el.innerHTML = `<div class="banner err">${err.message}</div>`; }
}

function styleBadges(style, strong){
  strong = strong || [];
  const parts = [];
  for (const b of (strong.length ? strong : []))
    parts.push(`<span style="background:${BC[b]};color:#12161f;font-weight:700;padding:2px 8px;border-radius:999px;font-size:.66rem">${BSHORT[b]}</span>`);
  for (const b of (style||[]).filter(b=>!strong.includes(b)))
    parts.push(`<span style="color:${BC[b]};font-weight:600;font-size:.7rem">leans ${BSHORT[b]}</span>`);
  return parts.length ? parts.join(" ") : `<span class="dim">—</span>`;
}
function strategyFit(e, leg, team){
  const P = lastPlan[`${e}|${leg}`];
  if (!P) return "";
  const a = (P.alternatives||[]).find(x=>x.team===team);
  if (!a) return "";
  const style = a.style||[], strong = a.style_strong||[];
  const wb = P.week_bucket;
  if (a.below_floor)
    return `<div class="banner err">⚠ <b>${team}</b> is a ${pct(a.win_prob)} pick — below your
      ${Math.round(P.floor*100)}% weekly floor, so the model flags it as elimination-risk and no
      strategy would recommend it. <b>It is fully selectable</b> — confirm and pin below, and the
      season plan will re-route around your call. Your pick, your information.</div>`;
  // Describe THE TEAM first, in its own right
  const teamTxt = strong.length
    ? `<b>${team}</b> IS the <b>${strong.map(b=>BSHORT[b]).join(" + ")}</b> pick this week`
    : `<b>${team}</b> leans <b>${style.map(b=>BSHORT[b]).join(" + ")}</b>`;
  if (!wb) return `<div class="banner info">${teamTxt}. (No strategy is set for ${leg}.)</div>`;
  if (strong.includes(wb))
    return `<div class="banner ok">✓ ${teamTxt} — exactly what your selected strategy (${BSHORT[wb]}) would take.</div>`;
  if (style.includes(wb))
    return `<div class="banner ok">✓ ${teamTxt} — consistent with your selected strategy for ${leg} (${BSHORT[wb]}).</div>`;
  const wbPick = (P.alternatives||[]).find(x=>(x.style_strong||[]).includes(wb));
  const dep = wbPick ? deployNote(routeEntry(), wbPick.team, leg) : "";
  return `<div class="banner info">${teamTxt} — a different style than this week's setting
    (<b style="color:${BC[wb]}">${BSHORT[wb]}</b>${wbPick?`, whose pure this-week pick is <b>${wbPick.team}</b>${dep}`:""}).
    Not wrong, just a different character of risk.</div>`;
}

function plannedAt(e, team, exceptLeg){
  const spots = [];
  for (const [lid, t] of Object.entries(D.plan[e]||{}))
    if (t===team && lid!==exceptLeg) spots.push(lid);
  for (const [lid, t] of Object.entries(D.entries[e].picks||{}))
    if (t===team && lid!==exceptLeg && !spots.includes(lid)) spots.push(`${lid} 🔒`);
  // other entries too (decorrelation pressure)
  const others = [];
  for (const oe of Object.keys(D.entries)) {
    if (oe===e) continue;
    for (const [lid, t] of Object.entries(D.plan[oe]||{}))
      if (t===team) others.push(`E${EL(oe)} ${lid}`);
  }
  return {mine: spots, others};
}
function deployNote(e, team, leg){
  const w = plannedAt(e, team, leg);
  if (w.mine.length) return ` — but ${team} is already planned for <b>${w.mine.join(", ")}</b>; moving it here reshuffles the season plan`;
  if (w.others.length) return ` — note ${team} is planned on ${w.others.join(", ")} (decorrelation pressure)`;
  return "";
}

function routingNote(P, leg){
  // When the model's ★ pick is NOT the week-strategy's pure this-week choice,
  // say why: season routing (no-reuse, holiday pools, decorrelation).
  const wb = P.week_bucket;
  const mp = (P.alternatives||[]).find(x=>x.team===P.model_pick);
  if (!mp) return "";
  const strong = mp.style_strong||[];
  if (!wb || strong.includes(wb)) return "";
  const wbPick = (P.alternatives||[]).find(x=>(x.style_strong||[]).includes(wb));
  const dep = wbPick ? deployNote(routeEntry(), wbPick.team, leg) : "";
  return `<p class="dim" style="margin-top:4px">Note: the ★ model pick (${P.model_pick}) serves the
    <b>season plan</b> — rather than ${BSHORT[wb]}'s pure this-week choice${wbPick?` (<b>${wbPick.team}</b>${dep})`:""}.
    Changing this week's strategy only re-picks when it beats the whole-season cost of the swap.
    Set Projection to “This week” for pure strategy behavior with no season routing.</p>`;
}
function routeEntry(){ return route.startsWith("entry-") ? route.slice(6) : Object.keys(D.entries).sort()[0]; 
}

async function runWhatIf(e, leg, team){
  const el = $("#whatif"); el.innerHTML = `<p class="dim">re-solving season around ${team}…</p>`;
  try {
    const W = await api("/api/whatif", {entry:e, leg, team, ...dials});
    if (W.status!=="Optimal"){
      el.innerHTML = `<div class="banner err">Solver: ${W.status}. This pick likely breaks a hard constraint
        (e.g. exhausts a holiday pool). Strong signal NOT to take it.</div>`; return; }
    const d = (W.p_choice!=null&&W.p_model!=null)?W.p_choice-W.p_model:null;
    el.innerHTML = strategyFit(e, leg, team) + `
      <div class="metricrow">
        <div class="metric"><div class="lbl">MODEL · ${W.model_pick||"—"}</div><div class="val">${pct(W.p_model)}</div></div>
        <div class="metric"><div class="lbl">YOURS · ${team}</div><div class="val">${pct(W.p_choice)}
          ${d!=null?`<span class="${d>=0?'up':'dn'}">${d>=0?"+":""}${(d*100).toFixed(1)}%</span>`:""}</div></div></div>
      ${W.ripple.length?`<div class="banner info">Portfolio ripple: `+
        W.ripple.map(r=>`E${EL(r.entry)} ${r.leg}: ${r.before}→${r.after}`).join(" · ")+`</div>`:""}
      <table><thead><tr><th>Week</th><th>Current plan</th><th>With ${team}</th><th></th></tr></thead><tbody>` +
      W.diff.map(r=>`<tr><td>${r.leg}</td>
        <td>${r.before?`${r.before} (${Math.round((r.pb||0)*100)}%)`:"—"}</td>
        <td>${r.after?`${r.after} (${Math.round((r.pa||0)*100)}%)`:"—"}</td>
        <td>${r.changed?"🔄":""}</td></tr>`).join("") + `</tbody></table>
      <label class="ck"><input type="checkbox" onchange="$('#pin-btn').disabled=!this.checked"> Confirm</label>
      <div class="actrow"><button class="go" id="pin-btn" disabled onclick="doLock('${e}','${leg}','${team}')">
        ${leg===D.current_leg?`Lock ${team}`:`Pin ${team} · ${leg}`}</button></div>`;
  } catch(err){ el.innerHTML = `<div class="banner err">${err.message}</div>`; }
}

/* ---------- actions ---------- */
async function setBucket(e, bucket, leg){
  try {
    await api("/api/bucket", {entry:e, bucket:bucket||null, leg:leg||null});
    toast(leg ? `${leg} → ${bucket||"default"}` : `Entry ${EL(e)} default → ${bucket||"none"}`);
    await refresh();
  } catch(err){ toast(`⚠ ${err.message}`); }
}
async function doLock(e, leg, team){
  try { await api("/api/lock",{entry:e,leg,team}); toast(`Locked ${team} · ${leg}`); await refresh(); }
  catch(err){ toast(`⚠ ${err.message}`); }
}
async function doUnlock(e, leg){
  try { const r=await api("/api/unlock",{entry:e,leg}); toast(`Unlocked ${r.removed} · ${leg}`); await refresh(); }
  catch(err){ toast(`⚠ ${err.message}`); }
}
async function advanceWeek(){ await api("/api/advance",{leg:$("#adv-leg").value});

async function doNudge(){
  const delta = parseFloat($("#nudge-delta").value);
  if (!delta){ toast("delta is 0"); return; }
  const r = await api("/api/nudge",{team:$("#nudge-team").value, delta, note:$("#nudge-note").value||null});
  toast(`nudged (cumulative ${r.cumulative>0?"+":""}${r.cumulative})`); await refresh(); }

async function loadTeams(entry, hideUsed){
  const el = $("#tmx");
  try {
    const T = await api(`/api/teams?entry=${entry}`);
    const weeks = T.weeks;
    let names = Object.keys(T.teams);
    names.sort((a,b) => (T.teams[a].used?1:0)-(T.teams[b].used?1:0)
      || T.teams[b].ou - T.teams[a].ou || a.localeCompare(b));
    if (hideUsed) names = names.filter(t=>!T.teams[t].used);
    const head = `<tr><th>Team</th><th class="num">O/U</th>` +
      weeks.map(w=>`<th>${w.holiday?(w.id==="TXWEEK"?"🎄":"🎁"):""}${w.id}</th>`).join("") + `</tr>`;
    const rows = names.map(t => {
      const info = T.teams[t];
      const recStr = info.record?` <span class="dim">(${info.record})</span>`:"";
      const pools = (info.in_tx?"🎄":"")+(info.in_xmas?"🎁":"");
      // best remaining spot: this team's highest win% across all shown weeks
      let bestLeg = null, bestP = -1;
      for (const w of weeks) {
        const g = info.schedule[w.id];
        if (g && g.p > bestP) { bestP = g.p; bestLeg = w.id; }
      }
      const cells = weeks.map(w => {
        const g = info.schedule[w.id];
        if (!g) return `<td class="dim">—</td>`;
        const cls = g.p>=0.6?"cell-g":g.p>=0.5?"cell-a":"cell-r";
        const star = w.id===bestLeg ? `<span class="best">★</span> ` : "";
        return `<td class="${cls}">${star}${g.home?"vs":"@"} ${g.opp} <b>${Math.round(g.p*100)}%</b></td>`;
      }).join("");
      return `<tr class="${info.used?'rowused':''}"><th>${t}${pools}${recStr}</th>
        <td class="num">${info.ou.toFixed(1)}</td>${cells}</tr>`;
    }).join("");
    el.innerHTML = `<table><thead>${head}</thead><tbody>${rows}</tbody></table>`;
  } catch(err){ el.innerHTML = `<div class="banner err">${err.message}</div>`; }
}


async function runAudit(){
  const el = $("#audit"); el.innerHTML = `<p class="dim">simulating…</p>`;
  try {
    const n = $("#sim-n").value;
    const M = await api(`/api/simulate?trials=${n}&${qs()}`);
    const P = M.portfolio, ids = Object.keys(M.per_entry).sort();
    const ref = M.reference_chalk;
    const b = (e) => M.buckets[e] || "—";
    const nov = (e) => Object.keys(M.leg_buckets[e]||{}).length;

    // headline metric
    const exp = P.exp_alive_tx, refexp = ref?ref.exp_alive_tx:null;
    const dist = P.tx_dist;
    let head = `<div class="metricrow">
      <div class="metric"><div class="lbl">E[entries alive entering Thanksgiving]</div>
        <div class="val">${exp.toFixed(3)}<span class="dim" style="font-size:.8rem"> / ${M.n_entries}</span></div></div>
      <div class="metric"><div class="lbl">Any entry alive at TX</div><div class="val">${(P.any_alive_tx*100).toFixed(1)}%</div></div>
      <div class="metric"><div class="lbl">Both alive at TX</div><div class="val">${(P.both_alive_tx*100).toFixed(2)}%</div></div>
      <div class="metric"><div class="lbl">Co-elimination rate</div><div class="val">${(P.co_elimination_rate*100).toFixed(0)}%
        <span class="dim" style="font-size:.7rem">lower = better hedge</span></div></div></div>`;

    // chalk comparison banner
    let cmp = "";
    if (ref){
      const gap = exp - refexp;
      const sign = gap>=0 ? "matches or beats" : "trails";
      cmp = `<div class="banner ${gap>=-0.002?'ok':'info'}">
        Vs a pure-survival (all-Chalk) plan: chalk reaches <b>E=${refexp.toFixed(3)}</b>, your plan
        <b>E=${exp.toFixed(3)}</b> — your strategy ${sign} the survival ceiling
        ${gap<-0.002?`by ${(Math.abs(gap)).toFixed(3)} alive-entries. That gap is the survival you're
        spending on decorrelation / contrarian leverage (leverage isn't simulated — it needs pick-popularity data).`
        :`. You're not giving up measurable survival.`}</div>`;
    }

    // distribution bar
    const distRow = dist.map((p,i)=>`<span class="dchip ${i>=1?'ok':'bad'}">${i} alive: ${(p*100).toFixed(1)}%</span>`).join("");

    // holiday decorrelation
    const dj = M.distinct;
    const hchip = (hw)=>{ const d=dj[hw];
      return `<span class="dchip ${d.distinct?'ok':'bad'}">${hw}: ${d.teams.map(t=>t||"—").join(" / ")} ${d.distinct?"✓ distinct":"⚠ not distinct"}</span>`; };

    // per-entry table
    let rows = ids.map(e=>{
      const pe = M.per_entry[e];
      const dead = pe.deadliest.slice(0,3).map(d=>`${d.leg} ${(d.rate*100).toFixed(0)}%`).join(", ");
      const refr = ref?ref.per_entry_reach_tx[e]:null;
      return `<tr><td>Entry ${EL(e)} <span class="dim">${b(e)}${nov(e)?` +${nov(e)}wk`:""}</span></td>
        <td class="num">${(pe.reach_tx*100).toFixed(1)}%${refr!=null?`<span class="dim"> (chalk ${(refr*100).toFixed(1)}%)</span>`:""}</td>
        <td class="num">${(pe.reach_xmas*100).toFixed(1)}%</td>
        <td class="num">${(pe.win*100).toFixed(2)}%</td>
        <td>${dead}</td></tr>`; }).join("");

    el.innerHTML = head + cmp +
      `<h2>Alive entering Thanksgiving — distribution</h2><div>${distRow}</div>
       <h2>Decorrelation at the holidays</h2><div>${hchip("TXWEEK")} ${hchip("XMASWEEK")}</div>
       <p class="dim">Co-elimination = how often both entries die the same week when both were alive. Distinct holiday teams = the hedge precondition (arrive with 2 alive on different teams).</p>
       <h2>Per entry</h2>
       <table><thead><tr><th>Entry</th><th class="num">Reach TX</th><th class="num">Reach XMAS</th><th class="num">Win season</th><th>Deadliest weeks</th></tr></thead>
       <tbody>${rows}</tbody></table>
       <p class="dim">${M.trials.toLocaleString()} trials · plan covers ${Object.values(M.planned_legs)[0]}/${M.total_legs} legs ·
       measures survival only; contrarian field-leverage is not modeled.</p>`;
  } catch(err){ el.innerHTML = `<div class="banner err">${err.message}</div>`; }
}

async function loadMarket(){
  const el=$("#mkt"); el.innerHTML=`<p class="dim">loading…</p>`;
  try {
    const M = await api(`/api/market?leg=${$("#mkt-leg").value}`);
    el.innerHTML = `<table><thead><tr><th>Game</th><th>Kickoff</th><th class="num">Spread</th>
      <th class="num">ML home</th><th class="num">ML away</th><th class="num">Total</th><th>Money →</th></tr></thead><tbody>`+
      M.rows.map(r=>`<tr><td><b>${r.away} @ ${r.home}</b></td><td class="dim">${r.kickoff||"—"}</td>
        <td class="num">${r.spread_open!=null&&r.spread!=null?`${r.spread_open} → ${r.spread}`:(r.spread??"—")}</td>
        <td class="num">${r.ml_home_open!=null?`${r.ml_home_open} → ${r.ml_home}`:(r.ml_home??"—")}</td>
        <td class="num">${r.ml_away_open!=null?`${r.ml_away_open} → ${r.ml_away}`:(r.ml_away??"—")}</td>
        <td class="num">${r.total??"—"}</td><td>${r.moving||"—"}</td></tr>`).join("")+`</tbody></table>
      <p class="dim">Home spread more negative or ML shortening = money on that side. Movement against the
      public side = reverse line movement, the strongest sharp signal.</p>`;
  } catch(err){ el.innerHTML=`<div class="banner err">${err.message}</div>`; }
}

  try { const r=await api("/api/lines",{leg:$("#mkt-leg").value});

async function loadInjuries(){
  const el=$("#inj"); el.innerHTML=`<p class="dim">fetching…</p>`;
  try {
    const I = await api("/api/injuries?severity=high");
    if (!I.teams.length){ el.innerHTML=`<p class="dim">no high-severity injuries right now</p>`; return; }

function ratingsTable(){
  const adj = D.elo_adjustments || {};
  const rows = Object.entries(adj).filter(([,v])=>Math.abs(v)>=0.5)
    .sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,16);
  if (!rows.length) return `<p class="dim">No rating movement yet — the table fills in as games finish.</p>`;
  return `<table style="max-width:460px"><thead><tr><th>Team</th>
    <th class="num">Season Δ (Elo)</th></tr></thead><tbody>` +
    rows.map(([t,v])=>`<tr><td>${t}${rec(t)}</td>
      <td class="num" style="color:${v>0?'var(--green)':'var(--red)'}">${v>0?"+":""}${v.toFixed(1)}</td></tr>`).join("") +
    `</tbody></table>
    <p class="dim">Cumulative: automatic results updates + your manual nudges.</p>`;
}


async function ingestPower(){
  const el = $("#pwr"); el.innerHTML = `<p class="dim">fetching FPI…</p>`;
  try {
    const w = parseFloat($("#fpi-w").value);
    const r = await api("/api/power", {weight: isNaN(w)?null:w});

      blend weight ${r.weight}. Top: ${r.top.map(([t,v])=>`${t} ${v>0?"+":""}${v}`).join(" · ")}</div>`;
    toast("FPI blended into projections"); await refresh();
  } catch(err){ el.innerHTML = `<div class="banner err">${err.message}</div>`; }

async function runVerify(){
  const el = $("#ver"); el.innerHTML = `<p class="dim">checking final scores…</p>`;
  try {
    const V = await api("/api/verify", {leg: $("#ver-leg").value});
    if (!V.results.length){ el.innerHTML = `<div class="banner info">No locked picks for this week — nothing to verify.</div>`; return; }
    el.innerHTML = V.results.map(r => {
      const cls = r.status==="SURVIVED" ? "ok" : r.status==="PENDING" ? "info" : "err";
      return `<div class="banner ${cls}">Entry ${EL(r.entry)} · ${r.team} → <b>${r.status}</b>${r.score?` · ${r.score}`:""}</div>`;
    }).join("") + `<p class="dim">${V.alive} entries alive</p>`;
    await refresh();
  } catch(err){ el.innerHTML = `<div class="banner err">${err.message}</div>`; }
}

async function runCheck(){
  const el=$("#chk"); el.innerHTML=`<p class="dim">running…</p>`;
  const C = await api("/api/check");
  el.innerHTML = C.passes.map(p=>`<div class="banner ok">✓ ${p}</div>`).join("")+
                 C.failures.map(f=>`<div class="banner err">✗ ${f}</div>`).join("");
}
